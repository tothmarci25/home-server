apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  backoffLimit: 30
  template:
    spec:
      restartPolicy: OnFailure

      serviceAccountName: vault
      containers:
        - name: bootstrap
          image: hashicorp/vault:1.15.6

          command:
            - sh
            - -c
            - |
              set -e

              echo "Waiting for Vault to be unsealed..."
              until vault status | grep -q 'Sealed *false'; do
                sleep 5
              done

              echo "Vault is unsealed. Starting bootstrap."

              echo "Enabling KV v2 (idempotent)..."
              vault secrets enable -path=kv kv-v2 || true

              echo "Enabling Kubernetes auth (idempotent)..."
              vault auth enable kubernetes || true

              echo "Configuring Kubernetes auth..."
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc" \
                kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                token_reviewer_jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token

              echo "Writing cloudflared policy..."
              vault policy write cloudflared /policies/cloudflared.hcl

              echo "Creating cloudflared role..."
              vault write auth/kubernetes/role/cloudflared \
                bound_service_account_names=cloudflared \
                bound_service_account_namespaces=cloudflared \
                policies=cloudflared \
                audience=vault \
                ttl=24h

              echo "Writing velero policy..."
              vault policy write velero /policies/velero.hcl

              echo "Creating velero role..."
              vault write auth/kubernetes/role/velero \
                bound_service_account_names=velero-server \
                bound_service_account_namespaces=velero \
                policies=velero \
                audience=vault \
                ttl=24h

              echo "Writing vault-snapshot policy..."
              vault policy write vault-snapshot /policies/vault-snapshot.hcl

              echo "Creating vault-snapshot role..."
              vault write auth/kubernetes/role/vault-snapshot \
                bound_service_account_names=vault-snapshot \
                bound_service_account_namespaces=vault \
                policies=vault-snapshot \
                audience=vault \
                ttl=1h

              echo "Vault bootstrap completed successfully."

          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-bootstrap-token
                  key: token

          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true

      volumes:
        - name: policies
          configMap:
            name: vault-policies
