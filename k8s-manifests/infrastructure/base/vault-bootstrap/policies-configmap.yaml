apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-policies
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  cloudflared.hcl: |
    path "kv/data/cloudflared" {
      capabilities = ["read"]
    }
  velero.hcl: |
    path "kv/data/velero/r2-credentials" {
      capabilities = ["read"]
    }
  vault-snapshot.hcl: |
    path "sys/storage/raft/snapshot" {
      capabilities = ["read"]
    }
    path "kv/data/vault/r2-snapshot-credentials" {
      capabilities = ["read"]
    }
