apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-config
  namespace: default
data:
  dnsmasq.conf: |
    # Use upstream DNS servers
    server=8.8.8.8
    server=1.1.1.1

    # Listen on all interfaces (important for MetalLB exposure)
    # interface=eth0
    # bind-interfaces

    # Prevent using /etc/resolv.conf
    no-resolv

    # Log DNS queries (optional)
    log-queries

    # Cache size
    cache-size=1000

    # Assign custom local hostnames
    address=/qbittorrent.home/{{ .Values.nginxIngressIP }}
    address=/sonarr.home/{{ .Values.nginxIngressIP }}
    address=/radarr.home/{{ .Values.nginxIngressIP }}
    address=/jackett.home/{{ .Values.nginxIngressIP }}
    address=/filebrowser.home/{{ .Values.nginxIngressIP }}
    address=/plex.home/{{ .Values.nginxIngressIP }}
    address=/argocd.home/{{ .Values.nginxIngressIP }}
