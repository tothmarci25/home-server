apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: velero-vault
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.vault.svc:8200"
    roleName: "velero"
    audience: "vault"
    objects: |
      - objectName: "cloud"
        secretPath: "kv/data/velero/r2-credentials"
        secretKey: "cloud"
  secretObjects:
    - secretName: velero-r2-credentials
      type: Opaque
      data:
        - objectName: cloud
          key: cloud
