server:
  enabled: true

  replicas: 1

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: vault-storage-pv

  auditStorage:
    enabled: true
    size: 5Gi
    storageClass: vault-audit-pv

  extraEnvironmentVars:
    VAULT_LOG_LEVEL: info

  ha:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        address     = "0.0.0.0:8200"
        tls_disable = 1
      }

      storage "raft" {
        path    = "/vault/data"
        node_id = "vault-0"
      }

      disable_mlock = true
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - host: vault.home
        paths:
           - path: /
             pathType: Prefix
             backend:
               service:
                 name: vault-ui
                 port:
                   number: 8200

snapshot:
  r2Bucket: home-server-velero-backups
  r2AccountId: 37535b085e86e334cd183fc92c0415ad

ui:
  enabled: true

injector:
  enabled: false   # you are using CSI, not injector

csi:
  enabled: true    # installs Vault CSI provider automatically

