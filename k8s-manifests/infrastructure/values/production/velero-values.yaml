configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: home-server-velero-backups
      credential:
        name: velero-r2-credentials
        key: cloud
      config:
        region: auto
        s3Url: https://37535b085e86e334cd183fc92c0415ad.r2.cloudflarestorage.com
        s3ForcePathStyle: "true"
credentials:
  useSecret: false
schedules:
  nightly-config-backup:
    schedule: "0 2 * * *"
    template:
      includedNamespaces:
        - default
      snapshotVolumes: false
      defaultVolumesToFsBackup: true
nodeAgent:
  enabled: true
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins
