apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/tothmarci25/home-server
      path: k8s-manifests/infrastructure/charts/velero
      targetRevision: HEAD
    - repoURL: https://vmware-tanzu.github.io/helm-charts
      chart: velero
      targetRevision: 12.0.0
      helm:
        valueFiles:
          - $values/k8s-manifests/infrastructure/values/staging/velero-values.yaml
    - repoURL: https://github.com/tothmarci25/home-server
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
